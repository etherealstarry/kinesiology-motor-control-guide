site_name: 运动控制学习指南
site_url: https://etherealstarry.github.io/kinesiology-motor-control-guide/
site_author: EtherealStarry
site_description: TAMU Motor Neuroscience PhD 自学指南

repo_name: kinesiology-motor-control-guide
repo_url: https://github.com/etherealstarry/kinesiology-motor-control-guide/

copyright: Copyright &copy; 2024-present <a href="https://github.com/etherealstarry" target="_blank" rel="noopener noreferrer">EtherealStarry</a>

theme:
  name: material
  language: zh
  static_templates:
    - 404.html
  favicon: images/favicon.ico
  apple-touch-icon-precomposed: images/mobile_icon.png
  include_search_page: false
  search_index_only: true

  features:
    - header.autohide
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.annotate
    - navigation.tabs
    - navigation.sections

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式

  font:
    text: Roboto Slab
    code: Roboto Mono

  icon:
    repo: fontawesome/brands/github

  custom_dir: overrides

markdown_extensions:
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - fenced_code

plugins:
  - search:
      lang:
        - zh
        - en

  - minify:
      minify_html: true

  - open-in-new-tab:

# nav: 自动从 docs/ 目录结构生成，无需手动维护

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/etherealstarry/kinesiology-motor-control-guide/
